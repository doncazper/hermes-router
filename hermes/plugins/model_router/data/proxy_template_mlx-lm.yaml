proxy:
  host: 127.0.0.1
  port: 8082
  routing_profile: balanced
  routing_mode: decision
  default_backend: null
  default_model: null
  respect_client_model: false
  unknown_model_behavior: fallback_to_default
  safety_gate_mode: decision_only
  model_ids:
    - model-router

router_config: ~/.model-router/model_router.yaml

observability:
  enabled: true
  log_path: ~/.model-router/logs/routing-events.jsonl
  prompt_capture: redacted_preview
  max_bytes: 10485760
  backups: 5

health:
  backend_timeout_seconds: 1.0

backend_policy:
  version: 1
  backend_allowlist: []
  backend_denylist: []

verifier:
  version: 1
  mode: "off"
  backend: null
  sample_rate: 0.0
  route_codes: []
  timeout_seconds: 10
  failure_behavior: log_only
  include_response_preview: false
  max_response_preview_chars: 500

backends:
  fast:
    base_url: http://127.0.0.1:8090/v1
    model: REPLACE_WITH_MLX_FAST_MODEL
    timeout_seconds: 300
    strip_tools: true
    runtime:
      enabled: true
      kind: mlx-lm
      command:
        - mlx_lm.server
        - --model
        - REPLACE_WITH_MLX_FAST_MODEL
        - --port
        - "8090"
      readiness_url: http://127.0.0.1:8090/v1/models
      readiness_timeout_seconds: 30
      idle_timeout_seconds: 900
      shutdown_timeout_seconds: 5
      log_path: ~/.model-router/logs/mlx-fast.log
  balanced:
    base_url: http://127.0.0.1:8091/v1
    model: REPLACE_WITH_MLX_BALANCED_MODEL
    timeout_seconds: 300
    runtime:
      enabled: true
      kind: mlx-lm
      command:
        - mlx_lm.server
        - --model
        - REPLACE_WITH_MLX_BALANCED_MODEL
        - --port
        - "8091"
      readiness_url: http://127.0.0.1:8091/v1/models
      readiness_timeout_seconds: 30
      idle_timeout_seconds: 900
      shutdown_timeout_seconds: 5
      log_path: ~/.model-router/logs/mlx-balanced.log
  reasoning:
    base_url: http://127.0.0.1:8094/v1
    model: REPLACE_WITH_MLX_REASONING_MODEL
    timeout_seconds: 300
    runtime:
      enabled: true
      kind: mlx-lm
      command:
        - mlx_lm.server
        - --model
        - REPLACE_WITH_MLX_REASONING_MODEL
        - --port
        - "8094"
      readiness_url: http://127.0.0.1:8094/v1/models
      readiness_timeout_seconds: 30
      idle_timeout_seconds: 900
      shutdown_timeout_seconds: 5
      log_path: ~/.model-router/logs/mlx-reasoning.log
  code:
    base_url: http://127.0.0.1:8093/v1
    model: REPLACE_WITH_MLX_CODE_MODEL
    timeout_seconds: 300
    runtime:
      enabled: true
      kind: mlx-lm
      command:
        - mlx_lm.server
        - --model
        - REPLACE_WITH_MLX_CODE_MODEL
        - --port
        - "8093"
      readiness_url: http://127.0.0.1:8093/v1/models
      readiness_timeout_seconds: 30
      idle_timeout_seconds: 900
      shutdown_timeout_seconds: 5
      log_path: ~/.model-router/logs/mlx-code.log

engine_backends:
  fast_local: fast
  balanced_local: balanced
  reasoning_local: reasoning
  code_agent: code
  web_research: reasoning
  multimodal_vision: reasoning
  image_generation: reasoning

fallback_backends:
  fast:
    - balanced
  balanced:
    - reasoning
  code:
    - reasoning
