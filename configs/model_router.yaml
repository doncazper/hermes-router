routing_targets:
  simple: fast_local
  balanced: balanced_local
  reasoning: reasoning_local
  coding: code_agent
  research: web_research
  confirmation: human_confirm
engines:
  fast_local:
    provider: local
    model: hermes-fast-local
    adapter: local_chat
    strengths:
      - rewrite
      - extraction
      - formatting
    max_context: 8192
    cost_tier: free
    latency_tier: low
    enabled: true
    fallback: balanced_local
    availability:
      status: auto
  balanced_local:
    provider: local
    model: hermes-balanced-local
    adapter: local_chat
    strengths:
      - summarization
      - general tasks
      - moderate reasoning
    max_context: 16384
    cost_tier: free
    latency_tier: medium
    enabled: true
    fallback: reasoning_local
    availability:
      status: auto
  reasoning_local:
    provider: local
    model: hermes-reasoning-local
    adapter: local_reasoning
    strengths:
      - architecture
      - planning
      - long-context reasoning
    max_context: 65536
    cost_tier: free
    latency_tier: high
    enabled: true
    fallback: balanced_local
    availability:
      status: auto
  code_agent:
    provider: local
    model: hermes-local-code-agent
    adapter: local_code
    strengths:
      - code modification
      - repository inspection
      - tests
    max_context: 65536
    cost_tier: free
    latency_tier: medium
    enabled: true
    fallback: reasoning_local
    availability:
      status: auto
  claude_code:
    provider: anthropic
    model: claude-code
    adapter: claude_code
    strengths:
      - code modification
      - repository inspection
      - tests
    max_context: 200000
    cost_tier: high
    latency_tier: medium
    enabled: false
    fallback: code_agent
    availability:
      status: auto
      required_commands:
        - claude
  codex:
    provider: openai
    model: codex
    adapter: codex
    strengths:
      - code modification
      - repository inspection
      - tests
    max_context: 200000
    cost_tier: high
    latency_tier: medium
    enabled: false
    fallback: code_agent
    availability:
      status: auto
      required_commands:
        - codex
  web_research:
    provider: local
    model: hermes-web-research
    adapter: web_research
    strengths:
      - current information
      - citations
      - source-grounded research
    max_context: 32768
    cost_tier: medium
    latency_tier: high
    enabled: true
    fallback: reasoning_local
    availability:
      status: auto
  human_confirm:
    provider: human
    model: human-confirmation
    adapter: confirmation_gate
    strengths:
      - high-risk review
      - external-action confirmation
      - fail-closed routing
    max_context: 4096
    cost_tier: none
    latency_tier: manual
    enabled: true
    fallback: null
    availability:
      status: available
