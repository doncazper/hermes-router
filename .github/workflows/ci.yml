name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev,proxy]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Guard route_fast latency
        run: >
          python scripts/check_route_fast_latency.py
          --iterations 50000
          --repeat 3
          --max-best-us 25
          --max-mean-us 50
