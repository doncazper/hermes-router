[build-system]
requires = ["setuptools>=77.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-router"
version = "0.3.1"
description = "Deterministic Hermes model routing decisions"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6,<7",
]

[project.scripts]
hermes-router = "hermes.plugins.model_router.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.8,<1",
]

[tool.setuptools.packages.find]
include = ["hermes*"]

[tool.setuptools.package-data]
"hermes.plugins.model_router" = ["data/*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py311"
